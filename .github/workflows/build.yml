name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'
    
    - name: Install Cordova 12
      run: npm install -g cordova@12.0.0
    
    - name: Create Cordova project and build
      run: |
        # Создаём проект
        cordova create app com.starcatcher.game "Лови Звезду"
        
        # Переходим в папку проекта
        cd app
        
        # Копируем наши файлы
        rm -rf www
        cp -r ../www ./
        cp ../config.xml ./
        
        # Добавляем платформу Android
        cordova platform add android@12.0.0
        
        # ОТЛАДКА: смотрим, что в папке app
        echo "=== Содержимое папки app ==="
        ls -la
        
        echo "=== Содержимое папки platforms (если есть) ==="
        ls -la platforms || echo "Папки platforms нет"
        
        # Пробуем другой путь
        echo "=== Текущая директория ==="
        pwd
        
        # Меняем версию Gradle (используем полный путь)
        cd app/platforms/android || cd platforms/android || echo "Не могу найти папку"
        
        ./gradlew wrapper --gradle-version 8.5
        
        # Возвращаемся в app
        cd ../..
        
        # Запускаем сборку
        cordova build android --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: starcatcher-apk
        path: app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk