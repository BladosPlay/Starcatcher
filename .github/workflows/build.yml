name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Install Cordova 11
      run: npm install -g cordova@11.0.0
    
    - name: Create Cordova project
      run: |
        cordova create app com.starcatcher.game "Лови Звезду"
        cd app
        rm -rf www
        cp -r ../www ./
        cp ../config.xml ./
        cordova platform add android@11.0.0
    
    - name: Downgrade Gradle to 8.5
      run: |
        cd app/platforms/android
        ./gradlew wrapper --gradle-version 8.5
    
    - name: Build APK
      run: |
        cd app
        cordova build android --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: starcatcher-apk
        path: app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk