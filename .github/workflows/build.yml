name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'
    
    - name: Install Cordova
      run: npm install -g cordova@12.0.0
    
    - name: Install dependencies
      run: npm install
    
    - name: Add Android platform
      run: cordova platform add android@12.0.0
    
    - name: Build APK
      run: cordova build android --release -- --packageType=apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk