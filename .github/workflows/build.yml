name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'
    
    - name: Install Cordova 12
      run: npm install -g cordova@12.0.0
    
    - name: Create Cordova project
      run: |
        cordova create app com.starcatcher.game "Лови Звезду"
        cd app
        rm -rf www
        cp -r ../www ./
        cp ../config.xml ./
        cordova platform add android@12.0.0
    
    - name: Force Gradle 8.5 (совместим с XmlParser)
      working-directory: ./app
      run: |
        sed -i 's/distributionUrl=.*/distributionUrl=https\\:\\/\\/services.gradle.org\\/distributions\\/gradle-8.5-all.zip/' platforms/android/gradle/wrapper/gradle-wrapper.properties
    
    - name: Build APK
      working-directory: ./app
      run: cordova build android --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: starcatcher-apk
        path: app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk